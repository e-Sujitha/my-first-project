name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Download the code from your repository 
      # changed file to the runner's workspace
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Python for the test environment
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Install Playwright and its required browser engines
      - name: Install Dependencies
        run: |
          pip install playwright
          playwright install --with-deps

      # 4. Run your automated test (Must throw an error if it fails!)
      - name: Run Playwright Test
        run: |
          python test_version.py

      # 5. Log into Docker Hub using your GitHub Secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 6. Build the Docker image locally on the GitHub runner
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-nginx-site:latest .

      # 7. Push the built image up to your Docker Hub repository
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/my-nginx-site:latest

      # 8. SSH into EC2 and replace the container safely (No 'docker restart' bug)
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull the brand new image down to the EC2 server
            docker pull ${{ secrets.DOCKER_USERNAME }}/my-nginx-site:latest

            # Stop and remove the old container if it exists (|| true prevents crashing if it doesn't exist yet)
            docker stop my-site || true
            docker rm my-site || true

            # Spin up the new container with the fresh image
            docker run -d \
              --name my-site \
              --restart unless-stopped \
              -p 80:80 \
              ${{ secrets.DOCKER_USERNAME }}/my-nginx-site:latest